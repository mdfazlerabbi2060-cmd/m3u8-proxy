<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern HLS Player</title>
    <link rel="stylesheet" href="style.css">
    <!-- HLS.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="dark-theme">
    <div id="player-container" class="player-container">
        <!-- Input Section (Hidden in Embed Mode) -->
        <div id="setup-ui" class="setup-overlay">
            <div class="setup-box">
                <h1>HLS Stream Player</h1>
                <input type="text" id="stream-url" placeholder="Paste .m3u8 URL here..." aria-label="Stream URL">
                <div class="setup-buttons">
                    <button id="load-btn">Play Stream</button>
                    <button id="copy-link-btn" title="Copy link to this player with current stream">Copy Player Link</button>
                </div>
                <p id="error-display" class="error-msg"></p>
            </div>
        </div>

        <!-- Video & Controls -->
        <video id="video" playsinline></video>
        
        <!-- Custom Logo Overlay -->
        <img src="https://via.placeholder.com/100x40/000000/FFFFFF?text=LOGO" id="custom-logo" class="player-logo" alt="Logo">

        <!-- Loading Spinner -->
        <div id="spinner" class="spinner-overlay hidden">
            <div class="spinner"></div>
        </div>

        <!-- Custom Controls -->
        <div id="video-controls" class="controls-overlay hidden">
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-filled" id="progress-filled"></div>
                </div>
            </div>
            
            <div class="control-row">
                <div class="control-group">
                    <button id="play-pause" class="icon-btn">▶</button>
                    <div class="volume-container">
                        <button id="mute-btn" class="icon-btn">🔊</button>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
                    </div>
                    <span class="time-display">
                        <span id="current-time">0:00</span> / <span id="duration">0:00</span>
                    </span>
                </div>

                <div class="control-group">
                    <select id="speed-control" class="speed-select">
                        <option value="0.5">0.5x</option>
                        <option value="1" selected>1x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2x</option>
                    </select>
                    <button id="pip-btn" class="icon-btn" title="Picture in Picture">🖼</button>
                    <button id="fullscreen-btn" class="icon-btn">⛶</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
  </html>
